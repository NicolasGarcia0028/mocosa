<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi mocosa</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET Y VARIABLES (ahora en tonos amarillos) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dark-color: #000;
      /* Tonos amarillos para las rosas y la temática */
      --yellow-dark: #6e20c6; /* Amarillo oscuro / Dorado */
      --yellow-medium: #7605bd; /* Amarillo medio / Oro */
      --yellow-light: #ae00ff; /* Amarillo claro / Crema */
      --green-dark: #2d5016; /* Mantengo verdes para tallos */
      --green-medium: #4a7c23;
      --green-light: #6b8e23;
      --cream-pink: #fffbe6; /* Crema muy claro para contrastes suaves */
      --golden-pink: #f4c542; /* Dorado para botones y destacados */
      --soft-white: #fffef7; /* Fondo suave crema */
      --text-color: #5d4037; /* Mantengo el color de texto para legibilidad */
      --signature-color: #d4a017; /* Dorado profundo para la firma */
      --speed-leaf: 2s;
    }
    body {
      min-height: 100vh;
      background-color: var(--dark-color);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      perspective: 1000px;
      margin: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* ===== PANTALLA DE CONTRASEÑA (con tonos amarillos) ===== */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 200;
      /* Gradiente suave con tinte crema */
      background: linear-gradient(145deg, #fffef7 0%, #fff7e0 100%);
      animation: softFade 1s ease;
    }
    .screen.active { display: flex; }
    @keyframes softFade { from { opacity: 0; filter: blur(4px); } to { opacity: 1; filter: blur(0); } }

    .input-display {
      font-size: 42px;
      margin-bottom: 25px;
      letter-spacing: 20px;
      color: var(--golden-pink); /* Dorado */
      font-weight: bold;
      background: rgba(255,255,240,0.5);
      padding: 0 20px;
      border-radius: 30px;
    }
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 15px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      padding: 25px;
      border-radius: 50px;
      /* Sombra dorada */
      box-shadow: 0 15px 35px rgba(244, 197, 66, 0.3); 
    }
    .key {
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid var(--cream-pink); /* Crema claro */
      border-radius: 30px;
      width: 80px;
      height: 80px;
      font-size: 26px;
      cursor: pointer;
      transition: 0.2s;
      color: #b8860b; /* Dorado oscuro para dígitos */
      box-shadow: 0 5px 0 rgba(0,0,0,0.05);
    }
    .key:hover {
      background: var(--golden-pink); /* Dorado al hover */
      color: white;
      transform: translateY(-5px);
      /* Sombra dorada */
      box-shadow: 0 10px 15px rgba(244, 197, 66, 0.5); 
    }

    /* ===== JARDÍN DE ROSAS AMARILLAS ===== */
    .night {
      position: fixed;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      filter: blur(0.1vmin);
      /* NUEVO FONDO: AURORA BOREAL (reemplaza el gradiente verde) */
      background: linear-gradient(to bottom, #020111 0%,#191621 30%,#20202c 50%,#3d3d4e 70%,#66667e 85%,#a3a3b3 100%); /* Fondo base oscuro */
      background-image: 
        radial-gradient(ellipse at 50% -20%, rgba(100, 255, 218, 0.3) 0%, rgba(10, 10, 30, 0) 80%), /* Luces cian */
        radial-gradient(ellipse at 80% 10%, rgba(128, 222, 234, 0.25) 0%, rgba(10, 10, 30, 0) 70%), /* Luces turquesa */
        radial-gradient(ellipse at 20% 15%, rgba(179, 157, 219, 0.2) 0%, rgba(10, 10, 30, 0) 70%); /* Luces violetas */
      /* Sutil efecto de movimiento para la aurora */
      animation: auroraMove 20s ease-in-out infinite alternate;
      z-index: 5;
      pointer-events: none;
    }

    @keyframes auroraMove {
      0% { background-position: 0% 0%; }
      100% { background-position: 10% 15%; }
    }

    .shooting-stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .shooting-star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.8);
      opacity: 0;
      animation: shootingStar 3s linear infinite;
    }

    @keyframes shootingStar {
      0% { opacity: 0; transform: translateX(0) translateY(0) rotate(45deg); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateX(120vw) translateY(50vh) rotate(10deg); }
    }

    .ground {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 25vmin;
      /* Ajuste de color del suelo para la aurora */
      background: linear-gradient(to top, #020111, #0a101f);
      z-index: 5;
    }

    .grass-blade {
      position: absolute;
      bottom: 0;
      width: 2vmin;
      height: 8vmin;
      /* Ajuste de color de la hierba para la aurora */
      background: linear-gradient(to bottom, #1d352b, #0a1a14); 
      border-radius: 5vmin;
      transform-origin: bottom center;
      opacity: 0.7; /* Menor opacidad para integrar mejor */
      filter: blur(0.3vmin); /* Un poco más de blur */
      box-shadow: 0 0 1.5vmin rgba(10, 20, 15, 0.3); /* Sombra más oscura */
      animation: grass-sway 3.5s infinite ease-in-out; /* Animación más lenta */
    }

    @keyframes grass-sway {
      0%, 100% { transform: rotate(1.5deg); }
      50% { transform: rotate(-1.5deg); }
    }

    .flowers {
      position: relative;
      transform: scale(0.8);
      z-index: 20;
    }

    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 50;
    }

    /* --- Posiciones de las 10 Rosas --- */
    .flower--1 { left: 0%; animation: mov-1 4s infinite; }
    .flower--1 .flower__line { height: 75vmin; }

    .flower--2 { left: 25%; transform: rotate(15deg); animation: mov-2 4s infinite; }
    .flower--2 .flower__line { height: 65vmin; animation-delay: 0.2s; }

    .flower--3 { left: -25%; transform: rotate(-15deg); animation: mov-3 4s infinite; }
    .flower--3 .flower__line { height: 70vmin; animation-delay: 0.4s; }

    .flower--4 { left: 50%; transform: rotate(25deg); animation: mov-2 3.5s infinite; }
    .flower--4 .flower__line { height: 80vmin; animation-delay: 0.6s; }

    .flower--5 { left: -50%; transform: rotate(-25deg); animation: mov-3 4.5s infinite; }
    .flower--5 .flower__line { height: 78vmin; animation-delay: 0.8s; }

    .flower--6 { left: 12%; transform: rotate(5deg); animation: mov-1 3.8s infinite; z-index: 45; }
    .flower--6 .flower__line { height: 55vmin; animation-delay: 1s; }

    .flower--7 { left: -12%; transform: rotate(-5deg); animation: mov-1 4.2s infinite; z-index: 45; }
    .flower--7 .flower__line { height: 60vmin; animation-delay: 1.2s; }

    .flower--8 { left: 40%; transform: rotate(20deg); animation: mov-2 4s infinite; z-index: 35; }
    .flower--8 .flower__line { height: 88vmin; animation-delay: 1.4s; }

    .flower--9 { left: -40%; transform: rotate(-20deg); animation: mov-3 4s infinite; z-index: 35; }
    .flower--9 .flower__line { height: 85vmin; animation-delay: 1.6s; }

    .flower--10 { left: 70%; transform: rotate(30deg); animation: mov-2 5s infinite; }
    .flower--10 .flower__line { height: 70vmin; animation-delay: 1.8s; }

    /* =========================================
        ESTRUCTURA DE LA ROSA (CABEZA) - AHORA AMARILLA
        ========================================= */
    .flower__leafs {
      position: relative;
      animation: blooming-flower 2s backwards;
      z-index: 10;
    }

    /* Pétalo base genérico para heredar estilos */
    .rose-petal {
      position: absolute;
      bottom: 0;
      left: 50%;
      /* Gradiente de pétalos en tonos amarillos */
      background-image: linear-gradient(to top, var(--yellow-dark), var(--yellow-medium), var(--yellow-light));
      transform-origin: bottom center;
      opacity: 0.95;
      box-shadow: inset 0 0 2vmin rgba(0, 0, 0, 0.6), 0 0 0.5vmin rgba(0, 0, 0, 0.3);
    }

    /* Capa 1: Pétalo trasero y base ancha */
    .petal-1 { 
      width: 13vmin; height: 11vmin; 
      border-radius: 40% 40% 50% 50%; 
      transform: translate(-50%, -1vmin); 
      z-index: 1; filter: brightness(0.6); 
    }

    /* Capa 2: Pétalos exteriores que abrazan la flor */
    .petal-2 { 
      width: 9vmin; height: 12vmin; 
      border-radius: 10% 80% 40% 50%; 
      transform: translate(-90%, 0) rotate(-15deg); 
      z-index: 2; box-shadow: inset -1vmin 0 2vmin rgba(0,0,0,0.6); 
    }
    .petal-3 { 
      width: 9vmin; height: 12vmin; 
      border-radius: 80% 10% 50% 40%; 
      transform: translate(-10%, 0) rotate(15deg); 
      z-index: 2; box-shadow: inset 1vmin 0 2vmin rgba(0,0,0,0.6); 
    }

    /* Capa 3: Pétalos interiores envolventes */
    .petal-4 { 
      width: 8vmin; height: 10vmin; 
      border-radius: 20% 80% 50% 50%; 
      transform: translate(-70%, -1vmin) rotate(-10deg); 
      z-index: 3; filter: brightness(0.85); 
    }
    .petal-5 { 
      width: 8vmin; height: 10vmin; 
      border-radius: 80% 20% 50% 50%; 
      transform: translate(-30%, -1vmin) rotate(10deg); 
      z-index: 3; filter: brightness(0.85); 
    }

    /* Capa 4: El núcleo apretado (centro de la rosa) */
    .petal-6 { 
      width: 6vmin; height: 8vmin; 
      border-radius: 50% 50% 40% 40%; 
      transform: translate(-50%, -1.5vmin); 
      z-index: 4; filter: brightness(0.9); 
    }
    .petal-7 { 
      width: 4vmin; height: 6vmin; 
      border-radius: 50%; 
      transform: translate(-65%, -2vmin) rotate(-15deg); 
      z-index: 5; filter: brightness(1.1); 
      box-shadow: 0.5vmin 0 1vmin rgba(0,0,0,0.4); 
    }
    .petal-8 { 
      width: 4vmin; height: 5.5vmin; 
      border-radius: 50%; 
      transform: translate(-35%, -2vmin) rotate(15deg); 
      z-index: 5; filter: brightness(1); 
    }

    /* Base de la flor (Receptáculo / Cáliz) */
    .flower__base {
      position: absolute;
      left: 50%;
      bottom: -1.5vmin;
      transform: translateX(-50%);
      width: 6vmin;
      height: 4vmin;
      border-radius: 50% 50% 40% 40%;
      /* Ajuste ligero de color para mayor integración */
      background-image: linear-gradient(to top, #1a2a1f, #2d5016); 
      z-index: 6;
      box-shadow: inset 0 -1vmin 1vmin rgba(0,0,0,0.5);
    }

    /* Sépalos */
    .sepal {
      position: absolute;
      bottom: -1.5vmin;
      left: 50%;
      width: 1.5vmin;
      height: 5vmin;
      background: #2d5016; /* Mantener verde base */
      z-index: 7;
      box-shadow: inset 0 0 0.5vmin rgba(0,0,0,0.5);
    }
    .sepal-1 { transform: translateX(-250%) rotate(-50deg); border-radius: 0 50% 0 50%; }
    .sepal-2 { transform: translateX(150%) rotate(50deg); border-radius: 50% 0 50% 0; }
    .sepal-3 { transform: translateX(-50%) rotate(0deg); height: 3.5vmin; border-radius: 50% 50% 0 0; z-index: 5; }

    /* --- Tallo y Hojas --- */
    .flower__line {
      width: 1.5vmin;
      background-image: linear-gradient(to top, #1a2a1f, #2d5016, #4a7c23); /* Ajuste de color */
      box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5);
      animation: grow-flower-tree 4s backwards;
      position: relative;
      z-index: 1;
    }

    /* Hojas del tallo */
    .flower__line__leaf {
      --w: 12vmin;
      --h: calc(var(--w) + 8vmin);
      position: absolute;
      width: var(--w);
      height: var(--h);
      border-top-right-radius: var(--h);
      border-bottom-left-radius: var(--h);
      background-image: linear-gradient(to top, #1a2a1f, #2d5016, #4a7c23); /* Ajuste de color */
      box-shadow: inset 0 0 1vmin rgba(0, 0, 0, 0.3);
      transform-origin: bottom center;
      opacity: 0.9;
      animation: growing-leaf-ans 3s var(--speed-leaf) backwards;
    }

    .flower__line__leaf--1 { top: 30%; left: 100%; transform: rotate(60deg) rotateY(30deg); }
    .flower__line__leaf--2 { top: 55%; left: 100%; transform: rotate(70deg) rotateY(30deg) scale(0.8); }
    .flower__line__leaf--3 { top: 20%; left: -800%; transform: rotate(-60deg) rotateY(30deg) scaleX(-1); }
    .flower__line__leaf--4 { top: 45%; left: -800%; transform: rotate(-70deg) rotateY(30deg) scale(0.8) scaleX(-1); }

    /* --- Animaciones --- */
    @keyframes mov-1 { 0%,100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
    @keyframes mov-2 { 0%,100% { transform: rotate(15deg); } 50% { transform: rotate(10deg); } }
    @keyframes mov-3 { 0%,100% { transform: rotate(-15deg); } 50% { transform: rotate(-10deg); } }
    @keyframes grow-flower-tree { 0% { height: 0; } }
    @keyframes blooming-flower { 0% { transform: scale(0); opacity: 0; } }
    @keyframes growing-leaf-ans { 0% { transform: scale(0); opacity: 0; } }

    .not-loaded * { animation-play-state: paused !important; }

    /* ===== BOTONES FLOTANTES (dorados) ===== */
    .garden-buttons {
      position: fixed;
      bottom: 30px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 100;
      pointer-events: none;
    }
    .garden-buttons button {
      pointer-events: auto;
      width: 65px;
      height: 65px;
      border: none;
      border-radius: 50%;
      background: var(--golden-pink); /* Dorado */
      color: white;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(244, 197, 66, 0.7); /* Sombra dorada */
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .garden-buttons button:hover {
      transform: scale(1.1);
      background: #e6b422; /* Dorado intenso */
    }

    /* ===== MODAL DE LA CARTA (amarillo y typewriter) ===== */
    .letter-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .letter-modal.active { display: flex; }
    .notepad {
      background: rgba(255, 255, 255, 0.96);
      padding: 35px;
      border-radius: 40px 10px 40px 10px;
      border: 4px solid var(--cream-pink); /* Crema claro */
      /* Sombra dorada */
      box-shadow: 0 30px 60px rgba(244, 197, 66, 0.6); 
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      width: 90%;
      animation: popIn 0.4s ease;
    }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .close-modal {
      position: absolute;
      top: 15px; right: 20px;
      font-size: 28px;
      background: none;
      border: none;
      color: var(--golden-pink); /* Dorado */
      cursor: pointer;
      font-weight: bold;
    }
    .notepad h3 { font-size: 0.9rem; color: var(--golden-pink); letter-spacing: 2px; }
    .notepad h4 { font-family: 'Dancing Script', cursive; font-size: 2.6rem; margin: 0 0 20px; color: var(--signature-color); }
    .letter-body { line-height: 1.8; font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--text-color); }
    .letter-image { display: block; max-width: 100%; margin: 25px auto; border-radius: 20px; border: 5px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .signature { font-family: 'Dancing Script', cursive; font-size: 2rem; color: var(--signature-color); text-align: right; margin-top: 25px; }
    .btn-close-letter {
      background: var(--golden-pink); /* Dorado */
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 40px;
      font-size: 1rem;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-close-letter:hover { background: #e6b422; }

    /* Efecto Typewriter */
    .letter-body .typewriting-p {
      display: inline; /* Importante para que el cursor parpadee al final de la línea */
      position: relative;
    }
    .letter-body .typewriting-p.typing::after {
      content: '|';
      color: var(--golden-pink);
      animation: blink 0.7s infinite;
      position: relative;
      left: 2px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body class="not-loaded">

<audio id="bgMusic" loop>
  <source src="la luz.mp3" type="audio/mpeg">
</audio>

<div id="passwordScreen" class="screen active">
  <h2 style="font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: var(--signature-color); margin-bottom: 15px;">Para mi mocosa</h2>
  <div class="input-display" id="inputDisplay">••••</div>
  <div class="keypad">
    <button class="key" onclick="enterDigit('1')">1</button>
    <button class="key" onclick="enterDigit('2')">2</button>
    <button class="key" onclick="enterDigit('3')">3</button>
    <button class="key" onclick="enterDigit('4')">4</button>
    <button class="key" onclick="enterDigit('5')">5</button>
    <button class="key" onclick="enterDigit('6')">6</button>
    <button class="key" onclick="enterDigit('7')">7</button>
    <button class="key" onclick="enterDigit('8')">8</button>
    <button class="key" onclick="enterDigit('9')">9</button>
    <button class="key" style="background: var(--golden-pink); color: white;" onclick="checkPassword()">✔</button>
    <button class="key" onclick="enterDigit('0')">0</button>
    <button class="key" onclick="deleteLast()">⌫</button>
  </div>
  <p style="margin-top: 30px; color: #b8860b; font-style: italic;">💜</p>
</div>

<div id="garden-container" style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:10; display: none; align-items: flex-end; justify-content: center;">
  <div class="night"></div>
  <div class="shooting-stars"></div>
  <div class="ground"></div>
  <div class="flowers">
    <script>
      const flowerContainer = document.querySelector('.flowers');
      for (let i = 1; i <= 10; i++) {
        const flower = document.createElement('div');
        flower.className = `flower flower--${i}`;
        /* Inyectamos la estructura de la Rosa AMARILLA capa por capa */
        flower.innerHTML = `
          <div class="flower__leafs">
            <div class="rose-petal petal-1"></div>
            <div class="rose-petal petal-2"></div>
            <div class="rose-petal petal-3"></div>
            <div class="rose-petal petal-4"></div>
            <div class="rose-petal petal-5"></div>
            <div class="rose-petal petal-6"></div>
            <div class="rose-petal petal-7"></div>
            <div class="rose-petal petal-8"></div>
            <div class="flower__base"></div>
            <div class="sepal sepal-1"></div>
            <div class="sepal sepal-2"></div>
            <div class="sepal sepal-3"></div>
          </div>
          <div class="flower__line">
            <div class="flower__line__leaf flower__line__leaf--1"></div>
            <div class="flower__line__leaf flower__line__leaf--2"></div>
            <div class="flower__line__leaf flower__line__leaf--3"></div>
            <div class="flower__line__leaf flower__line__leaf--4"></div>
          </div>
        `;
        flowerContainer.appendChild(flower);
      }
    </script>
  </div>

  <div class="garden-buttons">
    <button id="musicToggleBtn" onclick="toggleMusic()">💤</button> <button id="showLetterBtn" onclick="showLetter()">💌</button>
  </div>
</div>

<div id="letterModal" class="letter-modal">
  <div class="notepad">
    <button class="close-modal" onclick="closeLetter()">&times;</button>
    <h3>💜 Marzo 28</h3> <h4>mi hermosa constelacion 🌌</h4>

      <p class="typewriting-p" data-text="y que seré ese lugar seguro donde puedas dar todo de ti sin miedo, poder ser tierna, linda, detallista, perversa, pero sobre todo poder mejorar como persona y poder ser amada incondicionalmente, ya que siempre serás valorada porque seremos dos almas unidas para crear algo hermoso."></p>
        
      <img src="nueva historia.png" alt="Recuerdo especial" class="letter-image" onerror="this.src='https://via.placeholder.com/400x300?text=🌻+imagen1.jpg'">
    </div>
    <div class="signature">
      Eres todo lo bonito que hay en mi vida :<br>Te Amo 💖 </div>

  </div>
</div>

<script>
  // ---------- CONFIGURACIÓN GENERAL ----------
  const correctPassword = '2804';
  let input = '';
  let musicStarted = false;
  const audio = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicToggleBtn');

  const pwdScreen = document.getElementById('passwordScreen');
  const gardenContainer = document.getElementById('garden-container');
  const letterModal = document.getElementById('letterModal');

  // Funciones del teclado
  function enterDigit(digit) {
    // SE ELIMINÓ EL AUTO-PLAY DE AQUÍ PARA EVITAR QUE LA MÚSICA SALTE MIENTRAS SE DIGITA
    if (input.length < 4) {
      input += digit;
      updateDisplay();
    }
  }

  function deleteLast() {
    input = input.slice(0, -1);
    updateDisplay();
  }

  function updateDisplay() {
    document.getElementById('inputDisplay').textContent = input.padEnd(4, '•');
  }

  function checkPassword() {
    if (input === correctPassword) {
      pwdScreen.classList.remove('active');
      gardenContainer.style.display = 'flex'; // Mostramos el jardín

      // LA MÚSICA AHORA ARRANCA EXCLUSIVAMENTE AQUÍ, AL VALIDAR EL CÓDIGO CORRECTO
      if (!musicStarted) {
        audio.play().catch(e => console.log('Audio reproducido con éxito tras interacción del usuario.'));
        musicStarted = true;
        musicBtn.textContent = '💤';
      }
    } else {
      alert('Código incorrecto');
      input = '';
      updateDisplay();
    }
  }

  // Control de música
  function toggleMusic() {
    if (audio.paused) {
      audio.play();
      musicBtn.textContent = '💤'; 
    } else {
      audio.pause();
      musicBtn.textContent = '🎶'; 
    }
  }

  // ---------- EFECTO MÁQUINA DE ESCRIBIR ----------
  let currentParagraph = 0;
  let typewriterTimer = null;

  function typeParagraph(index, paragraphs, onComplete) {
    if (index >= paragraphs.length) {
      onComplete();
      return;
    }
    const p = paragraphs[index];
    const text = p.getAttribute('data-text');
    let i = 0;
    p.textContent = ''; 
    p.classList.add('typing'); 
    
    typewriterTimer = setInterval(() => {
      if (i < text.length) {
        p.textContent += text.charAt(i);
        i++;
      } else {
        clearInterval(typewriterTimer);
        p.classList.remove('typing'); 
        typeParagraph(index + 1, paragraphs, onComplete);
      }
    }, 50); 
  }

  function startTypewriter() {
    const pElements = document.querySelectorAll('.letter-body .typewriting-p');
    pElements.forEach(p => p.textContent = '');
    typeParagraph(0, pElements, () => { console.log('Escritura completada'); });
  }

  // Mostrar/cerrar carta
  function showLetter() {
    letterModal.classList.add('active');
    startTypewriter();
  }

  function closeLetter() {
    if (typewriterTimer) clearInterval(typewriterTimer);
    letterModal.classList.remove('active');
  }

  letterModal.addEventListener('click', function(e) {
    if (e.target === letterModal) closeLetter();
  });

  window.enterDigit = enterDigit;
  window.deleteLast = deleteLast;
  window.checkPassword = checkPassword;
  window.toggleMusic = toggleMusic;
  window.showLetter = showLetter;
  window.closeLetter = closeLetter;

  // ---------- INICIALIZACIÓN DEL JARDÍN ----------
  window.addEventListener('load', function() {
    setTimeout(() => {
      document.body.classList.remove("not-loaded");  

      function createShootingStar() {
        const container = document.querySelector('.shooting-stars');
        const star = document.createElement('div');
        star.className = 'shooting-star';
        star.style.top = Math.random() * 50 + '%';
        star.style.left = '-5%';
        star.style.animationDuration = (Math.random() * 2 + 2) + 's';
        container.appendChild(star);
        setTimeout(() => star.remove(), 4000);
      }

      setInterval(() => {
        if (Math.random() > 0.2) createShootingStar();
      }, 2500);

      function createGrass() {
        const ground = document.querySelector('.ground');
        for (let i = 0; i < 150; i++) {
          const blade = document.createElement('div');
          blade.className = 'grass-blade';
          blade.style.left = Math.random() * 100 + '%';
          blade.style.height = (Math.random() * 10 + 5) + 'vmin';
          blade.style.bottom = (Math.random() * 5) + 'vmin';
          blade.style.animationDelay = (Math.random() * 2) + 's';
          blade.style.animationDuration = (Math.random() * 1.5 + 2.5) + 's';
          ground.appendChild(blade);
        }
      }
      createGrass();
    }, 1000);
  });
</script>
</body>
